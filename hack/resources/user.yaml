---
apiVersion: slinky.slurm.net/v1beta1
kind: User
metadata:
  name: alice
  namespace: slurm
spec:
  controllerRef:
    name: slurm
  userName: alice
  adminLevel: None
  defaultAccount: research
  deletionPolicy: Delete
  associations:
    # Exercises every AssociationLimits field for end-to-end validation.
    - account: research
      limits:
        fairshare: "100"
        priority: 50
        qos:
          - normal
        defaultQos: normal
        grpTRES:
          cpu: "200"
          mem: "1000"
        grpJobs: 30
        grpSubmitJobs: 60
        grpWall: 24h
        maxJobs: 10
        maxSubmitJobs: 20
        maxTRESPerJob:
          cpu: "8"
        maxWallPerJob: 2h
    - account: research
      partition: debug
      limits:
        maxSubmitJobs: 5
