---
apiVersion: slinky.slurm.net/v1beta1
kind: User
metadata:
  name: alice
  namespace: slurm
spec:
  controllerRef:
    name: slurm
  # userName defaults to metadata.name (alice) when omitted.
  # adminLevel defaults to None when omitted.
  # defaultAccount defaults to the first association's account (research) when omitted.
  # deletionPolicy defaults to Delete when omitted.
  associations:
    # Exercises every AssociationLimits field for end-to-end validation.
    - account: research
      limits:
        fairshare: "100"
        priority: 50
        qos:
          - normal
        defaultQos: normal
        grpTRES:
          cpu: "200"
          mem: "1000"
        grpJobs: 30
        grpSubmitJobs: 60
        grpWall: 24h
        maxJobs: 10
        maxSubmitJobs: 20
        maxTRESPerJob:
          cpu: "8"
        maxWallPerJob: 2h
    - account: research
      partition: debug
      limits:
        maxSubmitJobs: 5
