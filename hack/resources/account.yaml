---
apiVersion: slinky.slurm.net/v1beta1
kind: Account
metadata:
  name: research
  namespace: slurm
spec:
  controllerRef:
    name: slurm
  # accountName defaults to metadata.name (research) when omitted.
  # description defaults to accountName when omitted.
  # organization defaults to "root" when omitted.
  # parentAccount defaults to "root" when omitted.
  # deletionPolicy defaults to Delete when omitted.
  # Exercises every AssociationLimits field for end-to-end validation.
  limits:
    fairshare: "200"
    priority: 100
    qos:
      - normal
    defaultQos: normal
    grpTRES:
      cpu: "100"
      mem: "500"
    grpJobs: 40
    grpSubmitJobs: 80
    grpWall: 48h
    maxJobs: 50
    maxSubmitJobs: 100
    maxTRESPerJob:
      cpu: "16"
    maxWallPerJob: 4h
