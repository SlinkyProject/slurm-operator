---
suite: test webhook configuration
templates:
  - webhook/webhook.yaml
chart:
  version: 1.2.3
  appVersion: 1.2.3
release:
  name: test-release
  namespace: test-namespace
tests:
  - it: should not render when webhook is disabled
    set:
      webhook:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: default manifest should match snapshot
    asserts:
      - matchSnapshot: {}

  - it: should honor overridden validating and mutating failurePolicy and matchPolicy values
    set:
      webhook:
        enabled: true
        validating:
          failurePolicy: Ignore
          matchPolicy: Exact
        mutating:
          failurePolicy: Fail
          matchPolicy: Exact
      certManager:
        enabled: false
        secretName: slurm-operator-webhook-ca
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].failurePolicy
          value: Ignore
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].matchPolicy
          value: Exact
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].failurePolicy
          value: Fail
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].matchPolicy
          value: Exact

  - it: should honor overridden timeoutSeconds
    set:
      webhook:
        timeoutSeconds: 30
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].timeoutSeconds
          value: 30
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].timeoutSeconds
          value: 30

  - it: should scope webhooks to configured namespaces
    values:
      - values/webhook_namespaces.yaml
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].namespaceSelector.matchExpressions[0]
          value:
            key: kubernetes.io/metadata.name
            operator: In
            values:
              - slurm
              - compute
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].namespaceSelector.matchExpressions[1]
          value:
            key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kube-system
              - kube-node-lease
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].namespaceSelector.matchExpressions[0]
          value:
            key: kubernetes.io/metadata.name
            operator: In
            values:
              - slurm
              - compute
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].namespaceSelector.matchExpressions[1]
          value:
            key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kube-system
              - kube-node-lease
              - test-namespace

  - it: should render the validating namespaceSelector override verbatim and leave the binding webhook scoped
    values:
      - values/webhook_namespaceselector.yaml
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].namespaceSelector
          value:
            matchLabels:
              kubernetes.io/metadata.name: slurm
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].namespaceSelector
          value:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values:
                  - kube-system
                  - kube-node-lease
                  - test-namespace

  - it: should keep the binding webhook scoped via webhook.namespaces when a validating override is set
    set:
      webhook:
        namespaces: slurm,compute
        validating:
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: slurm
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].namespaceSelector
          value:
            matchLabels:
              kubernetes.io/metadata.name: slurm
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].namespaceSelector
          value:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - slurm
                  - compute
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values:
                  - kube-system
                  - kube-node-lease
                  - test-namespace

  - it: should inject caBundle and render TLS secret when certManager is disabled
    set:
      certManager:
        enabled: false
        secretName: slurm-operator-webhook-ca
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        exists:
          path: webhooks[0].clientConfig.caBundle
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        exists:
          path: webhooks[0].clientConfig.caBundle
      - documentSelector:
          path: kind
          value: Secret
        equal:
          path: type
          value: kubernetes.io/tls
      - documentSelector:
          path: kind
          value: Secret
        equal:
          path: metadata.name
          value: slurm-operator-webhook-ca
      - documentSelector:
          path: kind
          value: Secret
        exists:
          path: data["tls.crt"]
      - documentSelector:
          path: kind
          value: Secret
        exists:
          path: data["tls.key"]
      - documentSelector:
          path: kind
          value: Secret
        exists:
          path: data["ca.crt"]

  - it: should generate a self-signed cert and inject the caBundle into every webhook when certManager is disabled
    set:
      certManager:
        enabled: false
        secretName: slurm-operator-webhook-ca
    asserts:
      # caBundle must be present on all validating webhooks, not just the first.
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        notExists:
          path: webhooks[?(@.clientConfig.caBundle == "")]
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        exists:
          path: webhooks[5].clientConfig.caBundle
      # The generated material must be base64-encoded PEM.
      - documentSelector:
          path: kind
          value: Secret
        matchRegex:
          path: data["tls.crt"]
          pattern: ^LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t
      - documentSelector:
          path: kind
          value: Secret
        matchRegex:
          path: data["ca.crt"]
          pattern: ^LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t
      - documentSelector:
          path: kind
          value: Secret
        matchRegex:
          path: data["tls.key"]
          pattern: ^LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVkt
      # cert-manager annotations must not be present in the native path.
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        notExists:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]

  - it: should not render the native TLS secret nor caBundle when certManager is enabled
    set:
      certManager:
        enabled: true
        secretName: slurm-operator-webhook-ca
    asserts:
      - notExists:
          path: webhooks[*].clientConfig.caBundle
        documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        exists:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
      - hasDocuments:
          count: 2

  - it: should reuse the existing serving certificate instead of regenerating when certManager is disabled
    set:
      certManager:
        enabled: false
        secretName: slurm-operator-webhook-ca
    kubernetesProvider:
      scheme:
        "v1/Secret":
          gvr:
            version: v1
            resource: secrets
          namespaced: true
      objects:
        - kind: Secret
          apiVersion: v1
          metadata:
            name: slurm-operator-webhook-ca
            namespace: test-namespace
          data:
            tls.crt: cmV1c2VkLXRscy1jcnQ=
            tls.key: cmV1c2VkLXRscy1rZXk=
            ca.crt: cmV1c2VkLWNhLWNydA==
    asserts:
      # The Secret data must be carried over verbatim from the existing Secret.
      - documentSelector:
          path: kind
          value: Secret
        equal:
          path: data["tls.crt"]
          value: cmV1c2VkLXRscy1jcnQ=
      - documentSelector:
          path: kind
          value: Secret
        equal:
          path: data["tls.key"]
          value: cmV1c2VkLXRscy1rZXk=
      - documentSelector:
          path: kind
          value: Secret
        equal:
          path: data["ca.crt"]
          value: cmV1c2VkLWNhLWNydA==
      # The injected caBundle must match the reused CA, not a freshly generated one.
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[0].clientConfig.caBundle
          value: cmV1c2VkLWNhLWNydA==
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].clientConfig.caBundle
          value: cmV1c2VkLWNhLWNydA==
