{{- if .Values.webhook.enabled }}
{{- $certNamespacedName := printf "%s/%s" (include "slurm-operator.namespace" .) .Values.certManager.secretName -}}
{{- $caBundle := "" -}}
{{- if not .Values.certManager.enabled }}
{{- $namespace := include "slurm-operator.namespace" . -}}
{{- $secretName := .Values.certManager.secretName -}}
{{- $durationDays := int 3650 -}}
{{- /* Reuse the existing serving certificate on upgrade to avoid rotating it
       (and the injected caBundle) on every render. Regenerate only when the
       Secret is missing/incomplete (e.g. first install). lookup returns an
       empty map during `helm template`/`--dry-run`, so a cert is generated then. */ -}}
{{- $existing := lookup "v1" "Secret" $namespace $secretName -}}
{{- $existingData := dict -}}
{{- if $existing -}}
{{- $existingData = ($existing.data | default dict) -}}
{{- end -}}
{{- $tlsCrt := index $existingData "tls.crt" | default "" -}}
{{- $tlsKey := index $existingData "tls.key" | default "" -}}
{{- if and $tlsCrt $tlsKey (index $existingData "ca.crt") -}}
{{- $caBundle = index $existingData "ca.crt" -}}
{{- else -}}
{{- $cn := include "slurm-operator.webhook.name" . -}}
{{- $dnsList := list (printf "%s.%s" (include "slurm-operator.webhook.name" .) $namespace) (printf "%s.%s.svc" (include "slurm-operator.webhook.name" .) $namespace) -}}
{{- $ca := genCA $secretName $durationDays -}}
{{- $cert := genSignedCert $cn nil $dnsList $durationDays $ca -}}
{{- $tlsCrt = $cert.Cert | b64enc -}}
{{- $tlsKey = $cert.Key | b64enc -}}
{{- $caBundle = $ca.Cert | b64enc -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "slurm-operator.webhook.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $tlsCrt | quote }}
  tls.key: {{ $tlsKey | quote }}
  ca.crt: {{ $caBundle | quote }}
{{- end }}{{- /* if not .Values.certManager.enabled */}}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "slurm-operator.webhook.name" . }}
  {{- if .Values.certManager.enabled }}
  annotations:
    certmanager.k8s.io/inject-ca-from: {{ $certNamespacedName | quote }}
    cert-manager.io/inject-ca-from: {{ $certNamespacedName | quote }}
  {{- end }}{{- /* if .Values.certManager.enabled */}}
  labels:
    {{- include "slurm-operator.webhook.labels" . | nindent 4 }}
webhooks:
  - name: accounting-v1beta1.kb.io
    namespaceSelector:
      {{- include "slurm-operator.webhook.namespaceSelector" (dict "root" $ "override" $.Values.webhook.validating.namespaceSelector) | nindent 6 }}
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - accountings
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- if not .Values.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}{{- /* if not .Values.certManager.enabled */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-accounting
    failurePolicy: {{ .Values.webhook.validating.failurePolicy }}
    matchPolicy: {{ .Values.webhook.validating.matchPolicy }}
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: controller-v1beta1.kb.io
    namespaceSelector:
      {{- include "slurm-operator.webhook.namespaceSelector" (dict "root" $ "override" $.Values.webhook.validating.namespaceSelector) | nindent 6 }}
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - controllers
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- if not .Values.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}{{- /* if not .Values.certManager.enabled */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-controller
    failurePolicy: {{ .Values.webhook.validating.failurePolicy }}
    matchPolicy: {{ .Values.webhook.validating.matchPolicy }}
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: loginset-v1beta1.kb.io
    namespaceSelector:
      {{- include "slurm-operator.webhook.namespaceSelector" (dict "root" $ "override" $.Values.webhook.validating.namespaceSelector) | nindent 6 }}
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - loginsets
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- if not .Values.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}{{- /* if not .Values.certManager.enabled */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-loginset
    failurePolicy: {{ .Values.webhook.validating.failurePolicy }}
    matchPolicy: {{ .Values.webhook.validating.matchPolicy }}
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: nodeset-v1beta1.kb.io
    namespaceSelector:
      {{- include "slurm-operator.webhook.namespaceSelector" (dict "root" $ "override" $.Values.webhook.validating.namespaceSelector) | nindent 6 }}
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - nodesets
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- if not .Values.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}{{- /* if not .Values.certManager.enabled */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-nodeset
    failurePolicy: {{ .Values.webhook.validating.failurePolicy }}
    matchPolicy: {{ .Values.webhook.validating.matchPolicy }}
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: restapi-v1beta1.kb.io
    namespaceSelector:
      {{- include "slurm-operator.webhook.namespaceSelector" (dict "root" $ "override" $.Values.webhook.validating.namespaceSelector) | nindent 6 }}
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - restapis
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- if not .Values.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}{{- /* if not .Values.certManager.enabled */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-restapi
    failurePolicy: {{ .Values.webhook.validating.failurePolicy }}
    matchPolicy: {{ .Values.webhook.validating.matchPolicy }}
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: token-v1beta1.kb.io
    namespaceSelector:
      {{- include "slurm-operator.webhook.namespaceSelector" (dict "root" $ "override" $.Values.webhook.validating.namespaceSelector) | nindent 6 }}
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - tokens
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- if not .Values.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}{{- /* if not .Values.certManager.enabled */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-token
    failurePolicy: {{ .Values.webhook.validating.failurePolicy }}
    matchPolicy: {{ .Values.webhook.validating.matchPolicy }}
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "slurm-operator.webhook.name" . }}
  {{- if .Values.certManager.enabled }}
  annotations:
    certmanager.k8s.io/inject-ca-from: {{ $certNamespacedName | quote }}
    cert-manager.io/inject-ca-from: {{ $certNamespacedName | quote }}
  {{- end }}{{- /* if .Values.certManager.enabled */}}
  labels:
    {{- include "slurm-operator.webhook.labels" . | nindent 4 }}
webhooks:
  - name: podsbinding-v1.kb.io
    namespaceSelector:
      {{- include "slurm-operator.webhook.namespaceSelector" (dict "root" $ "extraExcludes" (list (include "slurm-operator.namespace" $))) | nindent 6 }}
    admissionReviewVersions:
      - v1
    clientConfig:
      {{- if not .Values.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}{{- /* if not .Values.certManager.enabled */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /mutate--v1-binding
    failurePolicy: {{ .Values.webhook.mutating.failurePolicy }}
    matchPolicy: {{ .Values.webhook.mutating.matchPolicy }}
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods/binding
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    sideEffects: None
{{- end }}{{- /* if .Values.webhook.enabled */}}
