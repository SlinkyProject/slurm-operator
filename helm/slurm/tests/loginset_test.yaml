---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test loginset
templates:
  - loginset/loginset-cr.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 1.2.3
  appVersion: 1.2.3
tests:
  - it: manifest should match snapshot
    set:
      loginsets:
        slinky:
          enabled: true
          login:
            image:
              tag: v1.2.3
    asserts:
      - matchSnapshot: {}
  - it: should set imagePullSecrets
    set:
      imagePullSecrets:
        - name: "docker-secret-1"
        - name: "docker-secret-2"
      loginsets:
        slinky:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: docker-secret-1
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: docker-secret-2
  - it: should set resourceSettings
    set:
      loginsets:
        slinky:
          enabled: true
          podSpec:
            resources:
              limits:
                cpu: "2"
                memory: "4"
              requests:
                cpu: "1"
                memory: "2"
    asserts:
      - equal:
          path: spec.template.spec.resources
          value:
            limits:
              cpu: "2"
              memory: "4"
            requests:
              cpu: "1"
              memory: "2"
  - it: should add nodeSelector
    set:
      loginsets:
        slinky:
          enabled: true
          podSpec:
            nodeSelector:
              beta.kubernetes.io/os: linux
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["beta.kubernetes.io/os"]
          value: linux
  - it: should set affinity
    set:
      loginsets:
        slinky:
          enabled: true
          podSpec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: arch
                          operator: In
                          values:
                            - x86_64
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: x86_64
  - it: should add tolerations
    set:
      loginsets:
        slinky:
          enabled: true
          podSpec:
            tolerations:
              - key: "test"
                operator: "Exists"
                effect: "NoExecute"
                tolerationSeconds: 6000
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: test
  - it: should add topologySpreadConstraints
    set:
      loginsets:
        slinky:
          enabled: true
          podSpec:
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: topology.kubernetes.io/zone
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    foo: bar
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels.foo
          value: bar
  - it: should set strategy
    set:
      loginsets:
        slinky:
          enabled: true
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxUnavailable: 1
              maxSurge: 0
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 1
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 0
  - it: should not use priority class
    set:
      priorityClass:
        enabled: false
        name: slurm-priorityclass
      loginsets:
        slinky:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: ""
  - it: should use priority class
    set:
      priorityClass:
        enabled: true
        name: slurm-priorityclass
      loginsets:
        slinky:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: slurm-priorityclass
  - it: should override priority class
    set:
      priorityClass:
        enabled: false
        name: slurm-priorityclass
      loginsets:
        slinky:
          enabled: true
          podSpec:
            priorityClassName: foo-priorityclass
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: foo-priorityclass
  - it: should deploy multiple loginsets
    set:
      loginsets:
        slinky:
          enabled: true
        slinky2:
          enabled: true
          initconf:
            image:
              repository: docker.io/library/alpine
              tag: v1.2.3
          login:
            image:
              repository: ghcr.io/slinkyproject/login
              tag: v1.2.3
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: LoginSet
  - it: should inherit chart defaults on a non-slinky loginset
    set:
      loginsets:
        highmem:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: LoginSet
      - equal:
          path: spec.login.image
          value: ghcr.io/slinkyproject/login:25.11-ubuntu24.04
      - equal:
          path: spec.initconf.image
          value: docker.io/library/alpine:latest
      - equal:
          path: spec.replicas
          value: 1
  - it: should apply user overrides on top of inherited defaults (loginset)
    set:
      loginsets:
        highmem:
          enabled: true
          replicas: 8
          login:
            image:
              tag: my-custom-fork
    asserts:
      - equal:
          path: spec.replicas
          value: 8
      - equal:
          path: spec.login.image
          value: ghcr.io/slinkyproject/login:my-custom-fork
  - it: should deploy a slinky + custom loginset together
    set:
      loginsets:
        slinky:
          enabled: true
        highmem:
          enabled: true
    asserts:
      - hasDocuments:
          count: 2
  - it: should propagate user-set _defaults to every enabled loginset
    # Verifies that overriding a field on `loginsets._defaults` is inherited
    # by every sibling entry that does not explicitly override it.
    set:
      loginsets:
        _defaults:
          replicas: 5
          login:
            image:
              tag: from-defaults
        slinky:
          enabled: false
        highmem:
          enabled: true
        standard:
          enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: test-release-slurm-login-highmem
        documentIndex: 0
      - equal:
          path: spec.replicas
          value: 5
        documentIndex: 0
      - equal:
          path: spec.login.image
          value: ghcr.io/slinkyproject/login:from-defaults
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-release-slurm-login-standard
        documentIndex: 1
      - equal:
          path: spec.replicas
          value: 5
        documentIndex: 1
      - equal:
          path: spec.login.image
          value: ghcr.io/slinkyproject/login:from-defaults
        documentIndex: 1
  - it: overrides on one loginset must not bleed into a sibling
    # Pins the deepCopy invariant in the withDefaults helper: without
    # deepCopy, mustMergeOverwrite would mutate the shared _defaults map
    # on the first iteration, and `standard` would inherit highmem's
    # replicas override. Map keys iterate in sorted order, so the
    # alphabetically-first key (highmem) is documentIndex 0.
    set:
      loginsets:
        slinky:
          enabled: false
        highmem:
          enabled: true
          replicas: 8
        standard:
          enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: test-release-slurm-login-highmem
        documentIndex: 0
      - equal:
          path: spec.replicas
          value: 8
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-release-slurm-login-standard
        documentIndex: 1
      - equal:
          path: spec.replicas
          value: 1
        documentIndex: 1
