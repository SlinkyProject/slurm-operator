---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test restapi poddisruptionbudget
templates:
  - restapi/restapi-pdb.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 1.2.3
  appVersion: 1.2.3
tests:
  - it: should not render when pdb is not enabled
    set:
      restapi:
        replicas: 2
        pdb:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when there is only a single replica
    set:
      restapi:
        replicas: 1
        pdb:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should render with correct metadata, selector and spec when enabled
    set:
      restapi:
        replicas: 2
        pdb:
          enabled: true
          minAvailable: 1
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: test-release-slurm-restapi
      - equal:
          path: spec.minAvailable
          value: 1

  - it: should set custom minAvailable
    set:
      restapi:
        replicas: 2
        pdb:
          enabled: true
          minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2

  - it: should use maxUnavailable when set and omit minAvailable
    set:
      restapi:
        replicas: 2
        pdb:
          enabled: true
          maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
      - notExists:
          path: spec.minAvailable

  - it: should override namespace when namespaceOverride is set
    set:
      namespaceOverride: custom-namespace
      restapi:
        replicas: 2
        pdb:
          enabled: true
          minAvailable: 1
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace
