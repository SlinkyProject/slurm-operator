---
suite: test vendor google gke
templates:
  - nodeset/nodeset-cr.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 1.2.3
  appVersion: 1.2.3
tests:
  - it: should not inject A3 Mega configuration when disabled
    template: nodeset/nodeset-cr.yaml
    set:
      vendor:
        google:
          a3mega:
            enabled: false
      nodesets:
        slinky:
          enabled: true
          slurmd:
            image:
              tag: v1.2.3
    asserts:
      - notExists:
          path: spec.template.metadata.annotations
      - notExists:
          path: spec.template.spec.containers
      - equal:
          path: spec.template.spec.initContainers
          value: []
      - equal:
          path: spec.template.spec.volumes
          value: []

  - it: should inject A3 Mega configuration when enabled and targeting nodeset
    template: nodeset/nodeset-cr.yaml
    set:
      vendor:
        google:
          a3mega:
            enabled: true
            targetNodeSets: ["slinky"]
            nodePool: "a3-mega-nodepool"
            networks: ["default", "vpc1", "vpc2"]
      nodesets:
        slinky:
          enabled: true
          slurmd:
            image:
              tag: v1.2.3
    asserts:
      # Node Pool Selector
      - equal:
          path: spec.template.spec.nodeSelector["cloud.google.com/gke-nodepool"]
          value: "a3-mega-nodepool"
      # Automatic GPU limits/requests injection
      - equal:
          path: spec.slurmd.resources.limits["nvidia.com/gpu"]
          value: 8
      - equal:
          path: spec.slurmd.resources.requests["nvidia.com/gpu"]
          value: 8
      # Annotations
      - equal:
          path: spec.template.metadata.annotations["networking.gke.io/default-interface"]
          value: "eth0"
      - equal:
          path: spec.template.metadata.annotations["networking.gke.io/interfaces"]
          value: |
            [
              {"interfaceName":"eth0","network":"default"},
              {"interfaceName":"eth1","network":"vpc1"},
              {"interfaceName":"eth2","network":"vpc2"}
            ]
      # sidecar container tcpxo-daemon
      - contains:
          path: spec.template.spec.containers
          content:
            name: tcpxo-daemon
            image: us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpxo/tcpgpudmarxd-dev:v1.0.21
            imagePullPolicy: Always
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -ex
                chmod 755 /fts/entrypoint_rxdm_container.sh
                /fts/entrypoint_rxdm_container.sh --num_hops=2 --num_nics=8 --uid= --alsologtostderr
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
                  - NET_BIND_SERVICE
            volumeMounts:
              - name: libraries
                mountPath: /usr/local/nvidia/lib64
              - name: sys
                mountPath: /hostsysfs
              - name: proc-sys
                mountPath: /hostprocsysfs
            env:
              - name: LD_LIBRARY_PATH
                value: /usr/local/nvidia/lib64
      # Volumes
      - contains:
          path: spec.template.spec.volumes
          content:
            name: libraries
            hostPath:
              path: /home/kubernetes/bin/nvidia/lib64
      - contains:
          path: spec.template.spec.volumes
          content:
            name: sys
            hostPath:
              path: /sys
      - contains:
          path: spec.template.spec.volumes
          content:
            name: proc-sys
            hostPath:
              path: /proc/sys
      - contains:
          path: spec.template.spec.volumes
          content:
            name: aperture-devices
            hostPath:
              path: /dev/aperture_devices
      # slurmd container volume mounts
      - contains:
          path: spec.slurmd.volumeMounts
          content:
            name: aperture-devices
            mountPath: /dev/aperture_devices
      # slurmd container environment variables
      - contains:
          path: spec.slurmd.env
          content:
            name: LD_LIBRARY_PATH
            value: /usr/local/nvidia/lib64
      - contains:
          path: spec.slurmd.env
          content:
            name: NCCL_FASTRAK_LLCM_DEVICE_DIRECTORY
            value: /dev/aperture_devices

