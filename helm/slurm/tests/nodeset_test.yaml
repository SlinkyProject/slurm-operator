---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test nodeset
templates:
  - nodeset/nodeset-cr.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 1.2.3
  appVersion: 1.2.3
tests:
  - it: manifest should match snapshot
    set:
      nodesets:
        slinky:
          enabled: true
          slurmd:
            image:
              tag: v1.2.3
    asserts:
      - matchSnapshot: {}
  - it: should set imagePullSecrets
    set:
      imagePullSecrets:
        - name: "docker-secret-1"
        - name: "docker-secret-2"
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: docker-secret-1
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: docker-secret-2
  - it: should set resourceSettings
    set:
      nodesets:
        slinky:
          enabled: true
          podSpec:
            resources:
              limits:
                cpu: "2"
                memory: "4"
              requests:
                cpu: "1"
                memory: "2"
    asserts:
      - equal:
          path: spec.template.spec.resources
          value:
            limits:
              cpu: "2"
              memory: "4"
            requests:
              cpu: "1"
              memory: "2"
  - it: should add nodeSelector
    set:
      nodesets:
        slinky:
          enabled: true
          podSpec:
            nodeSelector:
              beta.kubernetes.io/os: linux
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["beta.kubernetes.io/os"]
          value: linux
  - it: should set affinity
    set:
      nodesets:
        slinky:
          enabled: true
          podSpec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: arch
                          operator: In
                          values:
                            - x86_64
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: x86_64
  - it: should add tolerations
    set:
      nodesets:
        slinky:
          enabled: true
          podSpec:
            tolerations:
              - key: "test"
                operator: "Exists"
                effect: "NoExecute"
                tolerationSeconds: 6000
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: test
  - it: should add topologySpreadConstraints
    set:
      nodesets:
        slinky:
          enabled: true
          podSpec:
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: topology.kubernetes.io/zone
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    foo: bar
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels.foo
          value: bar
  - it: should set pinToNode
    set:
      nodesets:
        slinky:
          enabled: true
          pinToNode: true
    asserts:
      - equal:
          path: spec.pinToNode
          value: true
  - it: should not use priority class
    set:
      priorityClass:
        enabled: false
        name: slurm-priorityclass
      nodesets:
        slinky:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: ""
  - it: should use priority class
    set:
      priorityClass:
        enabled: true
        name: slurm-priorityclass
      nodesets:
        slinky:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: slurm-priorityclass
  - it: should override priority class
    set:
      priorityClass:
        enabled: false
        name: slurm-priorityclass
      nodesets:
        slinky:
          enabled: true
          podSpec:
            priorityClassName: foo-priorityclass
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: foo-priorityclass
  - it: should inherit chart defaults on a non-slinky nodeset
    set:
      nodesets:
        slinky:
          enabled: false
        gpu:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NodeSet
      - equal:
          path: spec.slurmd.image
          value: ghcr.io/slinkyproject/slurmd:25.11-ubuntu24.04
      - equal:
          path: spec.logfile.image
          value: docker.io/library/alpine:latest
      - equal:
          path: spec.scalingMode
          value: StatefulSet
      - equal:
          path: spec.pinToNode
          value: false
      - equal:
          path: spec.workloadDisruptionProtection
          value: true
  - it: should apply user overrides on top of inherited defaults (nodeset)
    set:
      nodesets:
        slinky:
          enabled: false
        gpu:
          enabled: true
          scalingMode: DaemonSet
          slurmd:
            image:
              tag: my-custom-fork
    asserts:
      - equal:
          path: spec.scalingMode
          value: DaemonSet
      - equal:
          path: spec.slurmd.image
          value: ghcr.io/slinkyproject/slurmd:my-custom-fork
  - it: should deploy a slinky + custom nodeset together
    set:
      nodesets:
        slinky:
          enabled: true
        gpu:
          enabled: true
    asserts:
      - hasDocuments:
          count: 2
  - it: should propagate user-set _defaults to every enabled nodeset
    # Verifies that overriding a field on `nodesets._defaults` is inherited
    # by every sibling entry that does not explicitly override it.
    set:
      nodesets:
        _defaults:
          scalingMode: DaemonSet
          slurmd:
            image:
              tag: from-defaults
        slinky:
          enabled: false
        gpu:
          enabled: true
        standard:
          enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: test-release-slurm-worker-gpu
        documentIndex: 0
      - equal:
          path: spec.scalingMode
          value: DaemonSet
        documentIndex: 0
      - equal:
          path: spec.slurmd.image
          value: ghcr.io/slinkyproject/slurmd:from-defaults
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-release-slurm-worker-standard
        documentIndex: 1
      - equal:
          path: spec.scalingMode
          value: DaemonSet
        documentIndex: 1
      - equal:
          path: spec.slurmd.image
          value: ghcr.io/slinkyproject/slurmd:from-defaults
        documentIndex: 1
  - it: overrides on one nodeset must not bleed into a sibling
    # Pins the deepCopy invariant in the withDefaults helper: without
    # deepCopy, mustMergeOverwrite would mutate the shared _defaults map
    # on the first iteration, and `standard` would inherit gpu's
    # scalingMode override. Map keys iterate in sorted order.
    set:
      nodesets:
        slinky:
          enabled: false
        gpu:
          enabled: true
          scalingMode: DaemonSet
        standard:
          enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: test-release-slurm-worker-gpu
        documentIndex: 0
      - equal:
          path: spec.scalingMode
          value: DaemonSet
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-release-slurm-worker-standard
        documentIndex: 1
      - equal:
          path: spec.scalingMode
          value: StatefulSet
        documentIndex: 1
