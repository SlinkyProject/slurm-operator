---
# Example configuration for Google Cloud GKE A3 Ultra node topology

vendor:
  google:
    a3ultra:
      - targetNodeSet: a3-ultra-nodes
        nodePool: "a3-ultra-nodepool"
        networks:
          - default
          - rdma-0
          - rdma-1
          - rdma-2
          - rdma-3
          - rdma-4
          - rdma-5
          - rdma-6
          - rdma-7

# The GPU nodeset that matches targetNodeSet
nodesets:
  a3-ultra-nodes:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/slinkyproject/slurmd
      tag: 25.05-ubuntu24.04
    logfile:
      image:
        repository: docker.io/library/alpine
        tag: latest

# Slurm controller configuration
controller:
  extraConfMap:
    GresTypes: gpu
