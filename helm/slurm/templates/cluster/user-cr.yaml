{{- range $name, $user := $.Values.users | default dict }}
{{- $spec := deepCopy ($user | default dict) -}}
{{- if not (hasKey $spec "controllerRef") -}}
{{- $_ := set $spec "controllerRef" (dict "name" (include "slurm.fullname" $)) -}}
{{- end }}{{- /* if not controllerRef */}}
{{- $metadata := dict "labels" (fromYaml (include "slurm.labels" $)) }}
---
apiVersion: slinky.slurm.net/v1beta1
kind: User
metadata:
  name: {{ $name }}
  namespace: {{ include "slurm.namespace" $ }}
  {{- with $metadata }}
  {{- toYaml . | nindent 2 }}
  {{- end }}{{- /* with $metadata */}}
spec:
  {{- toYaml $spec | nindent 2 }}
{{- end }}{{- /* range .Values.users */}}
