{{- range $key, $nodeset := $.Values.nodesets }}
{{- $nodeset = mergeOverwrite (dict) (deepCopy ($.Values.nodesetDefaults | default dict)) (deepCopy ($nodeset | default dict)) -}}
{{- if $nodeset.enabled }}
{{- $name := printf "%s-%s" (include "slurm.worker.name" $) $key }}
{{- $metadata := merge dict ($nodeset.metadata | default dict) (dict "labels" (fromYaml (include "slurm.labels" $))) -}}
{{- $podSpec := $nodeset.podSpec | default dict -}}
{{- $imagePullSecrets := concat list ($podSpec.imagePullSecrets | default list) ($.Values.imagePullSecrets | default list) -}}
{{- $_ := set $podSpec "imagePullSecrets" $imagePullSecrets -}}
{{- $priorityClassName := $podSpec.priorityClassName | default (include "slurm.priorityClassName" $) -}}
{{- $_ := set $podSpec "priorityClassName" $priorityClassName -}}
{{- $_ := set $podSpec "hostname" (printf "%s-" $key) -}}

{{- /* ================= BEGIN GKE A3 MEGA INJECTION ================= */ -}}
{{- $a3megaConfig := dict -}}
{{- range $config := ($.Values.vendor.google | dig "a3mega" list) -}}
  {{- if eq (get $config "targetNodeSet" | default "") $key -}}
    {{- $a3megaConfig = $config -}}
  {{- end -}}
{{- end -}}
{{- if $a3megaConfig }}
  {{- $networks := get $a3megaConfig "networks" | default list -}}
  {{- if ne (len $networks) 9 -}}
    {{- fail (printf "Google Cloud GKE A3 Mega requires exactly 9 networks, but %d were specified." (len $networks)) -}}
  {{- end -}}

  {{- /* Inject Annotations */ -}}
  {{- $_ := set $ "a3megaConfig" $a3megaConfig -}}
  {{- $a3Annotations := tpl ($.Files.Get "_vendor/google/a3mega/annotations.yaml") $ | fromYaml -}}
  {{- $_ := set $metadata "annotations" (merge (get $metadata "annotations" | default dict) $a3Annotations) -}}

  {{- /* Inject NodeSelector for node pool */ -}}
  {{- if get $a3megaConfig "nodePool" }}
    {{- $nodeSelector := $podSpec.nodeSelector | default dict -}}
    {{- if not (hasKey $nodeSelector "cloud.google.com/gke-nodepool") -}}
      {{- $_ := set $nodeSelector "cloud.google.com/gke-nodepool" (get $a3megaConfig "nodePool") -}}
      {{- $_ := set $podSpec "nodeSelector" $nodeSelector -}}
    {{- end -}}
  {{- end }}

  {{- /* Inject slurmd resources limits/requests automatically */ -}}
  {{- $resources := $nodeset.slurmd.resources | default dict -}}
  {{- $limits := $resources.limits | default dict -}}
  {{- $requests := $resources.requests | default dict -}}
  {{- if not (hasKey $limits "nvidia.com/gpu") -}}
    {{- $_ := set $limits "nvidia.com/gpu" 8 -}}
  {{- end -}}
  {{- if not (hasKey $requests "nvidia.com/gpu") -}}
    {{- $_ := set $requests "nvidia.com/gpu" 8 -}}
  {{- end -}}
  {{- $_ := set $resources "limits" $limits -}}
  {{- $_ := set $resources "requests" $requests -}}
  {{- $_ := set $nodeset.slurmd "resources" $resources -}}

  {{- /* Inject extraConfMap with Gres */ -}}
  {{- $extraConfMap := $nodeset.extraConfMap | default dict -}}
  {{- if not (hasKey $extraConfMap "Gres") -}}
    {{- $_ := set $extraConfMap "Gres" "gpu:nvidia_h100_80gb_hbm3:8" -}}
    {{- $_ := set $nodeset "extraConfMap" $extraConfMap -}}
  {{- end -}}

  {{- /* Inject tcpxo-daemon sidecar container */ -}}
  {{- $containers := $podSpec.containers | default list -}}
  {{- $a3Containers := tpl ($.Files.Get "_vendor/google/a3mega/containers.yaml") $ | fromYamlArray -}}
  {{- $filteredA3Containers := list -}}
  {{- range $a3c := $a3Containers -}}
    {{- $exists := false -}}
    {{- range $c := $containers -}}{{ if eq $c.name $a3c.name }}{{ $exists = true }}{{ end }}{{ end -}}
    {{- if not $exists -}}{{ $filteredA3Containers = append $filteredA3Containers $a3c }}{{ end -}}
  {{- end -}}
  {{- $_ := set $podSpec "containers" (concat $containers $filteredA3Containers) -}}

  {{- /* Inject Host and EmptyDir Volumes */ -}}
  {{- $volumes := $podSpec.volumes | default list -}}
  {{- $a3Volumes := tpl ($.Files.Get "_vendor/google/a3mega/volumes.yaml") $ | fromYamlArray -}}
  {{- $filteredA3Volumes := list -}}
  {{- range $a3v := $a3Volumes -}}
    {{- $exists := false -}}
    {{- range $v := $volumes -}}{{ if eq $v.name $a3v.name }}{{ $exists = true }}{{ end }}{{ end -}}
    {{- if not $exists -}}{{ $filteredA3Volumes = append $filteredA3Volumes $a3v }}{{ end -}}
  {{- end -}}
  {{- $_ := set $podSpec "volumes" (concat $volumes $filteredA3Volumes) -}}

  {{- /* Inject slurmd volume mounts */ -}}
  {{- $slurmdVolumeMounts := $nodeset.slurmd.volumeMounts | default list -}}
  {{- $a3SlurmdVolumeMounts := tpl ($.Files.Get "_vendor/google/a3mega/slurmdVolumeMounts.yaml") $ | fromYamlArray -}}
  {{- $filteredA3SlurmdVolumeMounts := list -}}
  {{- range $a3vm := $a3SlurmdVolumeMounts -}}
    {{- $exists := false -}}
    {{- range $vm := $slurmdVolumeMounts -}}{{ if eq $vm.name $a3vm.name }}{{ $exists = true }}{{ end }}{{ end -}}
    {{- if not $exists -}}{{ $filteredA3SlurmdVolumeMounts = append $filteredA3SlurmdVolumeMounts $a3vm }}{{ end -}}
  {{- end -}}
  {{- $_ := set $nodeset.slurmd "volumeMounts" (concat $slurmdVolumeMounts $filteredA3SlurmdVolumeMounts) -}}

  {{- /* Inject slurmd environment variables */ -}}
  {{- $slurmdEnv := $nodeset.slurmd.env | default list -}}
  {{- $a3SlurmdEnv := tpl ($.Files.Get "_vendor/google/a3mega/slurmdEnv.yaml") $ | fromYamlArray -}}
  {{- $filteredA3SlurmdEnv := list -}}
  {{- range $a3e := $a3SlurmdEnv -}}
    {{- $exists := false -}}
    {{- range $e := $slurmdEnv -}}{{ if eq $e.name $a3e.name }}{{ $exists = true }}{{ end }}{{ end -}}
    {{- if not $exists -}}{{ $filteredA3SlurmdEnv = append $filteredA3SlurmdEnv $a3e }}{{ end -}}
  {{- end -}}
  {{- $_ := set $nodeset.slurmd "env" (concat $slurmdEnv $filteredA3SlurmdEnv) -}}

{{- end }}
{{- /* ================= END GKE A3 MEGA INJECTION ================= */ -}}

{{- $slurmd := $nodeset.slurmd | default dict -}}
{{- $_ := set $slurmd "env" ($slurmd.env | default list) -}}
{{- $_ := set $nodeset "slurmd" $slurmd -}}
{{- if and (include "vendor.dcgm.enabled" $) (include "vendor.dcgm.nodesetHasGPU" $slurmd) }}
  {{- $volumeMounts := $slurmd.volumeMounts | default list -}}
  {{- $dcgmVolumeMount := dict "name" "dcgm-job-mapping" "mountPath" (include "vendor.dcgm.jobMappingDir" $) }}
  {{- $volumeMounts = append $volumeMounts $dcgmVolumeMount }}
  {{- $_ := set $slurmd "volumeMounts" $volumeMounts -}}
  {{- $_ := set $nodeset "slurmd" $slurmd -}}
  {{- $volumes := $podSpec.volumes | default list -}}
  {{- $dcgmVolume := dict "name" "dcgm-job-mapping" "hostPath" (dict "path" (include "vendor.dcgm.jobMappingDir" $) "type" "DirectoryOrCreate") }}
  {{- $volumes = append $volumes $dcgmVolume }}
  {{- $_ := set $podSpec "volumes" $volumes -}}
{{- end }}
{{- $podTemplate := dict "metadata" $metadata "spec" $podSpec -}}
{{- $logfile := $nodeset.logfile | default dict }}
---
apiVersion: slinky.slurm.net/v1beta1
kind: NodeSet
metadata:
  name: {{ $name }}
  namespace: {{ include "slurm.namespace" $ }}
  {{- with $metadata }}
  {{- toYaml . | nindent 2 }}
  {{- end }}{{- /* with $metadata */}}
spec:
  controllerRef:
    name: {{ include "slurm.fullname" $ }}
  {{- if (include "slurm.worker.extraConf" $nodeset) }}
  extraConf: {{ include "slurm.worker.extraConf" $nodeset }}
  {{- end -}}{{- /* if (include "slurm.worker.extraConf" $nodeset) */}}
  {{- with $nodeset.partition }}
  partition:
    enabled: {{ .enabled }}
    {{- if (include "slurm.worker.partitionConfig" .) }}
    config: {{ include "slurm.worker.partitionConfig" . }}
    {{- end }}{{- /* if (include "slurm.worker.partitionConfig" .) */}}
  {{- end }}{{- /* with $nodeset.partition */}}
  {{- with $nodeset.ssh }}
  {{- if .enabled }}
  {{- $_ := set $nodeset.ssh "sssdConfRef" (dict "name" (include "slurm.sssdConf.name" $) "key" (include "slurm.sssdConf.key" $)) }}
  ssh:
    {{- toYaml . | nindent 4 }}
  {{- end }}{{- /* if .enabled */}}
  {{- end }}{{- /* with $nodeset.ssh */}}
  scalingMode: {{ $nodeset.scalingMode }}
  replicas: {{ $nodeset.replicas }}
  slurmd:
    {{- $_ := set $slurmd "imagePullPolicy" (get $slurmd "imagePullPolicy" | default $.Values.imagePullPolicy) -}}
    {{- include "format-container" $slurmd | nindent 4 }}
  logfile:
    {{- $_ := set $logfile "imagePullPolicy" (get $logfile "imagePullPolicy" | default $.Values.imagePullPolicy) -}}
    {{- include "format-container" $logfile | nindent 4 }}
  {{- include "format-podTemplate" $podTemplate | nindent 2 }}
  {{- with $nodeset.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}{{- /* with $nodeset.updateStrategy */}}
  ordinalPadding: {{ $nodeset.ordinalPadding }}
  pinToNode: {{ $nodeset.pinToNode }}
  workloadDisruptionProtection: {{ $nodeset.workloadDisruptionProtection }}
  pruneSlurmNodeRecords: {{ $nodeset.pruneSlurmNodeRecords }}
{{- end }}{{- /* $nodeset.enabled */}}
{{- end }}{{- /* range $nodeset := $.Values.nodesets */}}
