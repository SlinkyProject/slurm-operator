  name: {{ include "slurm.initScriptLoginName" . }}
  namespace: {{ include "slurm.namespace" . }}
  labels:
    {{- include "slurm.labels" . | nindent 4 }}
data:
  init.sh: |
    {{- .Values.initScriptLogin | nindent 4 }}
{{- end }}{{- /* if .Values.initScriptLogin */}}
