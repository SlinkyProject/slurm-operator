{{- if and .Values.networkPolicy.enabled .Values.networkPolicy.loginset }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "slurm.fullname" . }}-loginset
  namespace: {{ include "slurm.namespace" . }}
  labels:
    {{- include "slurm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: login
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 22
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    - ports:
        - protocol: TCP
          port: {{ include "slurm.controller.port" . }}
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: slurmctld
    - ports:
        - protocol: TCP
          port: 22
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: slurmd
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
