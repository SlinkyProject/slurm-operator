{{- range $key, $loginset := $.Values.loginsets -}}
{{- if $loginset.enabled }}
{{- $name := printf "%s-%s" (include "slurm.login.name" $) $key }}
{{- $podMetadata := $loginset.metadata | default dict -}}
{{- $podSpec := $loginset.podSpec | default dict -}}
{{- $imagePullSecrets := concat list ($podSpec.imagePullSecrets | default list) ($.Values.imagePullSecrets | default list) -}}
{{- $_ := set $podSpec "imagePullSecrets" $imagePullSecrets -}}
{{- $priorityClassName := $podSpec.priorityClassName | default $.Values.priorityClassName -}}
{{- $_ := set $podSpec "priorityClassName" $priorityClassName -}}
{{- /* Add shared memory volume and mount if shmSize is specified (Together addition) */}}
{{- if $podSpec.shmSize }}
  {{- $volumes := $podSpec.volumes | default list -}}
  {{- $shmVolume := dict "name" "dshm" "emptyDir" (dict "medium" "Memory" "sizeLimit" $podSpec.shmSize) -}}
  {{- $volumes = append $volumes $shmVolume -}}
  {{- $_ := set $podSpec "volumes" $volumes -}}
  {{- $volumeMounts := $loginset.login.volumeMounts | default list -}}
  {{- $shmVolumeMount := dict "name" "dshm" "mountPath" "/dev/shm" -}}
  {{- $volumeMounts = append $volumeMounts $shmVolumeMount -}}
  {{- $_ := set $loginset.login "volumeMounts" $volumeMounts -}}
{{- end }}
{{- /* Add existing data claim volumes and mounts (Together addition) */}}
{{- if and $loginset.persistence $loginset.persistence.existingDataClaims }}
  {{- $volumes := $podSpec.volumes | default list -}}
  {{- $volumeMounts := $loginset.login.volumeMounts | default list -}}
  {{- range $loginset.persistence.existingDataClaims }}
    {{- $pvcVolume := dict "name" .name "persistentVolumeClaim" (dict "claimName" .name) -}}
    {{- $volumes = append $volumes $pvcVolume -}}
    {{- $pvcVolumeMount := dict "name" .name "mountPath" .mountPath -}}
    {{- $volumeMounts = append $volumeMounts $pvcVolumeMount -}}
  {{- end }}
  {{- $_ := set $podSpec "volumes" $volumes -}}
  {{- $_ := set $loginset.login "volumeMounts" $volumeMounts -}}
{{- end }}
{{- $podTemplate := dict "metadata" $podMetadata "spec" $podSpec -}}
---
apiVersion: slinky.slurm.net/v1beta1
kind: LoginSet
metadata:
  name: {{ $name }}
  namespace: {{ include "slurm.namespace" $ }}
  labels:
    {{- include "slurm.labels" $ | nindent 4 }}
spec:
  controllerRef:
    name: {{ include "slurm.fullname" $ }}
    namespace: {{ include "slurm.namespace" $ }}
  {{- with $loginset.extraSshdConfig }}
  extraSshdConfig: |
    {{- . | nindent 4 }}
  {{- end }}{{- /* with $loginset.extraSshdConfig */}}
  sssdConfRef:
    name: {{ $name }}-sssd-conf
    key: sssd.conf
  {{- with $loginset.rootSshAuthorizedKeys }}
  rootSshAuthorizedKeys: |
    {{- . | nindent 4 }}
  {{- end }}{{- /* with $loginset.rootSshAuthorizedKeys */}}
  replicas: {{ $loginset.replicas }}
  login:
    {{- $_ := set $loginset.login "imagePullPolicy" (default $.Values.imagePullPolicy $loginset.login.imagePullPolicy) -}}
    {{- include "format-container" $loginset.login | nindent 4 }}
  {{- include "format-podTemplate" $podTemplate | nindent 2 }}
  {{- with $loginset.service }}
  service:
    {{- toYaml . | nindent 4 }}
  {{- end }}{{- /* with $loginset.service */}}
{{- end }}{{- /* $loginset.enabled */}}
{{- end }}{{- /* range $loginset := $.Values.loginsets */}}
